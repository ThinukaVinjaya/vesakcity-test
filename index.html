<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 AR Buddha Statue</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam;">
    
    <!-- Camera -->
    <a-camera position="0 1.6 0" rotation-reader></a-camera>

    <!-- Real-world floor anchor -->
    <a-plane rotation="-90 0 0" width="24" height="24" position="0 0 0" color="#111b10" opacity="0.08"></a-plane>

    <!-- Buddha statue placed on the left side at a fixed distance -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/budha_statue.glb" position="-3.6 0 -18" scale="2.0 2.0 2.0" rotation="0 35 0"></a-entity>
    <a-ring position="-3.6 0.02 -18" rotation="-90 0 0" radius-inner="1.0" radius-outer="1.4" color="#f8e2b6" opacity="0.38"></a-ring>
    <a-entity position="-3.6 0.6 -18">
      <a-light type="point" color="#ffeac4" intensity="1.2" distance="6"></a-light>
    </a-entity>

    <!-- Soft ambient lighting around the statue -->
    <a-light type="ambient" color="#fff7e7" intensity="0.55"></a-light>
    <a-light type="point" color="#ffefd5" intensity="0.9" distance="10" position="0 5 -10"></a-light>
  </a-scene>

  <div style="position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.6); padding:12px; border-radius:10px; font-family:sans-serif;">
    <h2>🙏 Buddha Statue</h2>
    <p>Fixed statue placed beautifully on the left side.</p>
  </div>
</body>
</html>
