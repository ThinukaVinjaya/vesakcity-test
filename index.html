<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 AR Vesak City with Flying Lanterns 🌸</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam;">
    
    <!-- Camera -->
    <a-camera gps-camera rotation-reader></a-camera>

    <!-- Ground and Path -->
    <a-plane rotation="-90 0 0" width="60" height="60" color="#1b4030" opacity="0.95"></a-plane>
    <a-plane rotation="-90 0 0" width="8" height="38" position="0 0.02 -12" color="#6b4529" opacity="0.97"></a-plane>
    <a-entity position="0 0.05 -12">
      <a-box position="0 0 6" width="0.18" height="0.02" depth="12" color="#f2d8b3"></a-box>
      <a-box position="0 0 0" width="0.18" height="0.02" depth="12" color="#f2d8b3"></a-box>
    </a-entity>

    <!-- Lotus path edges -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-3.5 0.03 -4" scale="0.45 0.45 0.45"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="3.5 0.03 -4" scale="0.4 0.4 0.4"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-3.5 0.03 -8" scale="0.5 0.5 0.5"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="3.5 0.03 -8" scale="0.45 0.45 0.45"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-3.5 0.03 -12" scale="0.5 0.5 0.5"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="3.5 0.03 -12" scale="0.4 0.4 0.4"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-3.5 0.03 -16" scale="0.45 0.45 0.45"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="3.5 0.03 -16" scale="0.38 0.38 0.38"></a-entity>

    <!-- Decorative lotus clusters -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-4.5 0.03 -20" scale="0.55 0.55 0.55"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="4.5 0.03 -20" scale="0.45 0.45 0.45"></a-entity>

    <!-- Path lanterns near lotus row -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/vesak_lanterns.glb" position="2.5 0 -6" scale="0.75 0.75 0.75"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/vesak_lanterns.glb" position="-2.5 0 -10" scale="0.75 0.75 0.75"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/vesak_lanterns.glb" position="2 0 -14" scale="0.7 0.7 0.7"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/vesak_lanterns.glb" position="-2 0 -18" scale="0.7 0.7 0.7"></a-entity>

    <!-- Left-side temple in the distance -->
    <a-entity 
      gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/sthupa_srilanka.glb"
      position="-14 0 -24" 
      scale="4.8 4.8 4.8" 
      rotation="0 -28 0"></a-entity>

    <!-- Right-side Buddha statues -->
    <a-entity 
      gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/budha_statue.glb"
      position="9 0 -18" 
      scale="3.1 3.1 3.1" 
      rotation="0 200 0"></a-entity>
    <a-entity 
      gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/stone_buddha_statue.glb"
      position="11 0 -14" 
      scale="2.5 2.5 2.5" 
      rotation="0 40 0"></a-entity>

    <!-- Custom flying lanterns rising into the sky -->
    <a-entity position="-4 1.3 -6" animation="property: position; to:-4 10 -18; dur:20000; easing: easeOutQuad; loop: true">
      <a-cone radius-bottom="0.18" radius-top="0.02" height="0.5" color="#f3a65d"></a-cone>
      <a-sphere position="0 0.4 0" radius="0.12" color="#ffda8a" material="emissive:#ffb547; emissiveIntensity:1"></a-sphere>
      <a-light type="point" color="#ffd680" intensity="1.4" distance="4" position="0 0.4 0"></a-light>
    </a-entity>
    <a-entity position="1 1.0 -8" animation="property: position; to:1 11 -16; dur:22000; easing: easeOutQuad; loop: true; delay: 700">
      <a-cone radius-bottom="0.16" radius-top="0.02" height="0.45" color="#ffb06e"></a-cone>
      <a-sphere position="0 0.35 0" radius="0.1" color="#ffe3a2" material="emissive:#ffc56b; emissiveIntensity:1"></a-sphere>
      <a-light type="point" color="#ffea8d" intensity="1.2" distance="3.5" position="0 0.35 0"></a-light>
    </a-entity>
    <a-entity position="4 1.5 -10" animation="property: position; to:4 12 -20; dur:24000; easing: easeOutQuad; loop: true; delay: 1200">
      <a-cone radius-bottom="0.14" radius-top="0.02" height="0.42" color="#ffbc7f"></a-cone>
      <a-sphere position="0 0.34 0" radius="0.1" color="#ffe9af" material="emissive:#ffd48d; emissiveIntensity:1"></a-sphere>
      <a-light type="point" color="#fff1a8" intensity="1.1" distance="3.5" position="0 0.34 0"></a-light>
    </a-entity>
    <a-entity position="-2 1.6 -14" animation="property: position; to:-2 13 -20; dur:22000; easing: easeOutQuad; loop: true; delay: 600">
      <a-cone radius-bottom="0.15" radius-top="0.02" height="0.45" color="#ffd89a"></a-cone>
      <a-sphere position="0 0.36 0" radius="0.1" color="#fff1b0" material="emissive:#ffe19d; emissiveIntensity:1"></a-sphere>
      <a-light type="point" color="#fff0a0" intensity="1.0" distance="3.5" position="0 0.36 0"></a-light>
    </a-entity>

    <!-- Decorative floating lotus boat -->
    <a-entity position="-6 0.05 -14" rotation="0 10 0">
      <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" scale="0.45 0.45 0.45"></a-entity>
      <a-light type="spot" color="#e2cfa2" intensity="0.6" position="0 1 0" angle="30" distance="5"></a-light>
    </a-entity>

    <!-- Lighting and sky -->
    <a-light type="ambient" color="#d9e8ff" intensity="0.75"></a-light>
    <a-light type="directional" color="#ffe4b0" intensity="0.9" position="0 12 -2"></a-light>
    <a-sky color="#0b1f3f"></a-sky>
  </a-scene>

  <div style="position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.6); padding:12px; border-radius:10px; font-family:sans-serif;">
    <h2>🌕 Vesak AR City</h2>
    <p>Move around • Look up for flying lanterns</p>
  </div>
</body>
</html>
