<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 AR Vesak City with Flying Lanterns 🌸</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam;">
    
    <!-- Camera -->
    <a-camera position="0 1.6 0" rotation-reader></a-camera>

    <!-- Real-world floor anchor -->
    <a-plane rotation="-90 0 0" width="24" height="24" position="0 0 0" color="#111b10" opacity="0.08"></a-plane>

    <!-- Soft lotus path plane on the floor -->
    <a-plane rotation="-90 0 0" width="3.8" height="20" position="0 0.01 -10" color="#ffe9d2" opacity="0.18"></a-plane>
    <a-plane rotation="-90 0 0" width="3.8" height="20" position="0 0.015 -10" color="#ffffff" opacity="0.05"></a-plane>

    <!-- Lotus path edges -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-1.8 0.02 -3" scale="0.34 0.34 0.34" animation="property: position; dir: alternate; dur: 4000; loop: true; to: -1.8 0.08 -3"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="1.8 0.02 -3" scale="0.28 0.28 0.28" animation="property: position; dir: alternate; dur: 4300; loop: true; to: 1.8 0.07 -3"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-1.8 0.02 -6" scale="0.36 0.36 0.36" animation="property: rotation; to:0 360 0; dur: 20000; easing: linear; loop: true"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="1.8 0.02 -6" scale="0.30 0.30 0.30" animation="property: rotation; to:0 -360 0; dur: 22000; easing: linear; loop: true"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-1.8 0.02 -9" scale="0.34 0.34 0.34"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="1.8 0.02 -9" scale="0.28 0.28 0.28"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-1.8 0.02 -12" scale="0.32 0.32 0.32"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="1.8 0.02 -12" scale="0.26 0.26 0.26"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-1.8 0.02 -15" scale="0.30 0.30 0.30"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="1.8 0.02 -15" scale="0.28 0.28 0.28"></a-entity>

    <!-- Center row of lotus decorations -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="0 0.02 -5" scale="0.22 0.22 0.22" rotation="0 45 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="0 0.02 -10" scale="0.24 0.24 0.24" rotation="0 -30 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="0 0.02 -13" scale="0.22 0.22 0.22" rotation="0 30 0"></a-entity>

    <!-- Soft lights for lotus pathway -->
    <a-light type="ambient" color="#fff7e7" intensity="0.55"></a-light>
    <a-light type="point" color="#ffefd5" intensity="0.9" distance="8" position="0 5 -10"></a-light>
  </a-scene>

  <div style="position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.6); padding:12px; border-radius:10px; font-family:sans-serif;">
    <h2>🌸 Lotus Path</h2>
    <p>Only the lotus path is shown for now.</p>
  </div>
</body>
</html>
