<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 AR Vesak City with Flying Lanterns 🌸</title>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam;">
    
    <!-- Camera -->
    <a-camera position="0 1.6 0" rotation-reader></a-camera>

    <!-- Real-world floor anchor -->
    <a-plane rotation="-90 0 0" width="24" height="24" position="0 0 0" color="#111b10" opacity="0.08"></a-plane>

    <!-- Soft lotus path plane on the floor (walkable center) -->
    <a-plane rotation="-90 0 0" width="5.4" height="20" position="0 0.01 -10" color="#ffe9d2" opacity="0.18"></a-plane>
    <a-plane rotation="-90 0 0" width="5.4" height="20" position="0 0.015 -10" color="#ffffff" opacity="0.05"></a-plane>
    <a-plane rotation="-90 0 0" width="0.24" height="20" position="-2.35 0.02 -10" color="#ffc7b8" opacity="0.25"></a-plane>
    <a-plane rotation="-90 0 0" width="0.24" height="20" position="2.35 0.02 -10" color="#ffc7b8" opacity="0.25"></a-plane>

    <!-- Lotus path edge flowers -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-2.4 0.02 -2.5" scale="0.32 0.32 0.32" rotation="0 20 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="2.4 0.02 -2.5" scale="0.30 0.30 0.30" rotation="0 -25 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-2.4 0.02 -6" scale="0.36 0.36 0.36" animation="property: rotation; to:0 360 0; dur: 22000; easing: linear; loop: true"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="2.4 0.02 -6" scale="0.32 0.32 0.32" animation="property: rotation; to:0 -360 0; dur: 24000; easing: linear; loop: true"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-2.4 0.02 -9.5" scale="0.34 0.34 0.34"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="2.4 0.02 -9.5" scale="0.30 0.30 0.30"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-2.4 0.02 -13" scale="0.32 0.32 0.32"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="2.4 0.02 -13" scale="0.28 0.28 0.28"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-2.4 0.02 -16" scale="0.30 0.30 0.30"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="2.4 0.02 -16" scale="0.28 0.28 0.28"></a-entity>

    <!-- Extra small lotus flowers on the floor, fixed positions -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="-0.8 0.02 -4.4" scale="0.18 0.18 0.18" rotation="0 15 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="0.9 0.02 -4.8" scale="0.20 0.20 0.20" rotation="0 -10 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="-1.1 0.02 -8.2" scale="0.16 0.16 0.16" rotation="0 30 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="1.2 0.02 -9.0" scale="0.18 0.18 0.18" rotation="0 -20 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus_flower2.glb" position="0.4 0.02 -12.4" scale="0.16 0.16 0.16" rotation="0 10 0"></a-entity>
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/lotus1.glb" position="-0.6 0.02 -13.8" scale="0.18 0.18 0.18" rotation="0 0 0"></a-entity>

    <!-- Buddha statue on left side at a distance -->
    <a-entity gltf-model="https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/budha_statue.glb" position="-3.6 0 -18" scale="1.9 1.9 1.9" rotation="0 35 0"></a-entity>
    <a-ring position="-3.6 0.02 -18" rotation="-90 0 0" radius-inner="0.9" radius-outer="1.2" color="#f8e2b6" opacity="0.35"></a-ring>
    <a-entity position="-3.6 0.6 -18">
      <a-light type="point" color="#ffeac4" intensity="1.1" distance="6"></a-light>
    </a-entity>

    <!-- Soft lights for lotus pathway -->
    <a-light type="ambient" color="#fff7e7" intensity="0.55"></a-light>
    <a-light type="point" color="#ffefd5" intensity="0.9" distance="10" position="0 5 -10"></a-light>
  </a-scene>

  <div style="position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.6); padding:12px; border-radius:10px; font-family:sans-serif;">
    <h2>🌸 Lotus Path</h2>
    <p>Only the lotus path is shown for now.</p>
  </div>
</body>
</html>
